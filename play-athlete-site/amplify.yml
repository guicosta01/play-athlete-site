version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install # ou yarn install, dependendo do seu gerenciador de pacotes
    build:
      commands:
        - npm run build # ou yarn build, dependendo do seu gerenciador de pacotes
  artifacts:
    baseDirectory: build
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
